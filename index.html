<style>
/* fix layout: la barra y el contenido deben ser columnas hermanas del body flex */
#root{display:contents}
/* Heaven panel — unified themeable styles.
   LIGHT theme = Direction A (Refinado). DARK theme = Direction B (Command Center).
   Toggle sets data-theme on <html>. Tokens flip; a few dark-only rules add
   the neon glow, mono numerals and grid texture that define the B aesthetic. */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#F5F7F8; --card:#FFFFFF; --card2:#FFFFFF; --ink:#0F1620;
  --line:#E7EAEE; --line2:#F0F2F4; --text:#16202C; --muted:#697483; --faint:#9BA4B0;
  --brand:#00B5AD; --brand-d:#0A7D77; --brand-ink:#04302E; --brand-bg:#E0F4F2;
  --green:#159A57; --green-bg:#E7F5ED; --green-ink:#0C5C34;
  --amber:#D98300; --amber-bg:#FBF0DA; --amber-ink:#7A4A00;
  --red:#DC4046; --red-bg:#FBE8E9; --red-ink:#871F23;
  --blue:#2E6FE0; --purple:#7A5AF0;
  --rail:#0F1620; --rail-tx:#A7B1BD; --rail-line:rgba(255,255,255,.07);
  --mono:'IBM Plex Mono',monospace; /* @kind font */
  --num-ff:'Hanken Grotesk',sans-serif; /* @kind font */
  --r:14px; --r-sm:9px; --r-lg:18px;
  --sh:0 1px 2px rgba(15,22,32,.04),0 4px 16px rgba(15,22,32,.05);
  --glow:none; /* @kind shadow */
  --grid:none; /* @kind other */
  --kpi-num-w:800; /* @kind font */
  --eb-ff:'Hanken Grotesk',sans-serif; /* @kind font */
  color-scheme:light;
}
html[data-theme="dark"]{
  --bg:#0A0E13; --card:#12181F; --card2:#161D26; --ink:#0A0E13;
  --line:#232C37; --line2:rgba(35,44,55,.6); --text:#E6EAEF; --muted:#8B97A4; --faint:#5E6975;
  --brand:#16C8BF; --brand-d:#16C8BF; --brand-ink:#04302E; --brand-bg:rgba(22,200,191,.1);
  --green:#2BB56E; --green-bg:rgba(43,181,110,.14); --green-ink:#4FE0A8;
  --amber:#E89A1C; --amber-bg:rgba(232,154,28,.14); --amber-ink:#F0C173;
  --red:#E8585D; --red-bg:rgba(232,88,93,.14); --red-ink:#FF9A9D;
  --blue:#4A86F0; --purple:#8B7BF5;
  --rail:rgba(7,10,14,.7); --rail-tx:#9AA6B2; --rail-line:#232C37;
  --num-ff:'IBM Plex Mono',monospace; /* @kind font */
  --kpi-num-w:600; /* @kind font */
  --sh:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
  --glow:0 0 16px rgba(22,200,191,.45); /* @kind shadow */
  --eb-ff:'IBM Plex Mono',monospace; /* @kind font */
  --grid:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px); /* @kind other */
  color-scheme:dark;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;
  background-image:var(--grid);background-size:42px 42px;transition:background-color .3s,color .3s}
.num{font-family:var(--num-ff);font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.eb{font-size:.62rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);font-weight:700;font-family:var(--eb-ff)}
html[data-theme="dark"] .eb::before{content:"// "}

/* ===== RAIL ===== */
.rail{width:230px;flex-shrink:0;background:var(--rail);color:var(--rail-tx);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--rail-line);backdrop-filter:blur(8px)}
.brand{padding:24px 22px 20px;border-bottom:1px solid var(--rail-line)}
.brand .h{font-size:1.32rem;font-weight:800;letter-spacing:2px;color:#fff}
.brand .h em{font-style:normal;color:var(--brand)}
html[data-theme="dark"] .brand .h em{text-shadow:0 0 14px rgba(22,200,191,.7)}
.brand .s{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:#69737F;margin-top:5px;font-weight:700}
html[data-theme="dark"] .brand .s{font-family:var(--mono)}
.nav{padding:16px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.nl{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:#5A6573;font-weight:700;padding:12px 12px 6px}
html[data-theme="dark"] .nl{font-family:var(--mono)}
.ni{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--rail-tx);font-weight:600;font-size:.83rem;cursor:pointer;border:1px solid transparent;background:none;text-align:left;width:100%;font-family:inherit;transition:.15s}
.ni:hover{background:rgba(255,255,255,.05);color:#fff}
.ni.active{background:var(--brand);color:var(--brand-ink);box-shadow:0 4px 14px rgba(0,181,173,.28)}
html[data-theme="dark"] .ni.active{background:linear-gradient(90deg,rgba(22,200,191,.16),rgba(22,200,191,.04));color:var(--brand);border-color:rgba(22,200,191,.35);box-shadow:inset 0 0 18px rgba(22,200,191,.08)}
html[data-theme="dark"] .ni.active svg{filter:drop-shadow(0 0 6px rgba(22,200,191,.8))}
.ni .bdg{margin-left:auto;font-size:.63rem;font-weight:800;background:rgba(220,64,70,.92);color:#fff;border-radius:99px;padding:1px 7px;font-family:var(--num-ff)}
.ni.active .bdg{background:rgba(4,48,46,.25);color:var(--brand-ink)}
html[data-theme="dark"] .ni .bdg{background:rgba(232,88,93,.18);color:#FF9A9D;border:1px solid rgba(232,88,93,.4)}
.foot{padding:16px 20px;border-top:1px solid var(--rail-line);font-size:.63rem;color:#69737F;line-height:1.6}
html[data-theme="dark"] .foot{font-family:var(--mono)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}
html[data-theme="dark"] .dot{box-shadow:0 0 8px var(--green)}

/* ===== MAIN ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{background:var(--card);border-bottom:1px solid var(--line);padding:17px 30px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;row-gap:10px;position:sticky;top:0;z-index:20}
html[data-theme="dark"] .top{background:rgba(10,14,19,.5);backdrop-filter:blur(10px)}
.top>div:first-child{min-width:0;flex:1 1 240px}
.crumb{font-size:.64rem;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:1.3px}
html[data-theme="dark"] .crumb{color:var(--brand);font-family:var(--mono)}
.top h1{font-size:1.18rem;font-weight:800;letter-spacing:-.3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;flex:1 1 auto}
@media(max-width:1024px){.top .chip{display:none}}
@media(max-width:680px){.top h1{white-space:normal}.tr{justify-content:flex-start}}
.chip{font-size:.7rem;color:var(--muted);font-family:var(--mono);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 11px}
.btn{font-weight:700;font-size:.76rem;border-radius:9px;padding:8px 13px;border:1px solid var(--line);background:var(--card);color:var(--text);display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-family:inherit;transition:.15s}
.btn:hover{border-color:var(--brand);color:var(--brand-d)}
.btn.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
html[data-theme="dark"] .btn.pri{background:var(--brand);color:var(--brand-ink);border-color:var(--brand);box-shadow:0 0 18px rgba(22,200,191,.4)}
.btn.icon{padding:8px 10px}
.scroll{flex:1;overflow-y:auto;padding:26px 30px 50px;display:flex;flex-direction:column;gap:26px}
.view{display:flex;flex-direction:column;gap:26px}
@media (prefers-reduced-motion:no-preference){.view{animation:vin .25s ease-out}}
@keyframes vin{from{transform:translateY(8px)}to{transform:none}}

/* ===== SECTION HEAD ===== */
.sh{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.sh h3{font-size:1.04rem;font-weight:800;letter-spacing:-.2px;margin-top:3px}
.sh p{font-size:.78rem;color:var(--muted);margin-top:3px;max-width:64ch}

/* ===== REACTIVACIÓN BAND (oportunidad #1) ===== */
.react-band{display:flex;align-items:center;gap:18px;background:linear-gradient(100deg,var(--red-bg),transparent 72%);border:1px solid var(--red-border);border-left:4px solid var(--red);border-radius:var(--r);padding:18px 22px;cursor:pointer;transition:box-shadow .18s,transform .18s}
.react-band:hover{box-shadow:var(--sh);transform:translateY(-2px)}
.react-ic{width:46px;height:46px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(220,64,70,.38)}
.react-body{flex:1;min-width:0}
.react-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:.6rem;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--red-ink)}
html[data-theme="dark"] .react-eyebrow{font-family:var(--mono)}
.react-h{font-size:1.18rem;font-weight:800;letter-spacing:-.3px;margin-top:5px;text-wrap:balance}
.react-d{font-size:.8rem;color:var(--muted);margin-top:5px;line-height:1.5;max-width:74ch}
.react-cta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;text-align:right;gap:2px;padding-left:18px;border-left:1px solid var(--red-border)}
.react-cta .num{font-size:1.4rem;font-weight:800;color:var(--red-ink);font-family:var(--num-ff);line-height:1}
.react-cta span:last-child{font-size:.64rem;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.4px}
@media(max-width:760px){.react-band{flex-wrap:wrap}.react-cta{border-left:none;padding-left:0;align-items:flex-start;text-align:left}}

/* ===== WORKLIST / ACTION LOOP (seguimiento + alertas) ===== */
.row-actions{display:inline-flex;gap:5px}
.row-act{width:27px;height:27px;border-radius:7px;border:1px solid var(--line);background:var(--card);color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:.13s;font-family:inherit;padding:0}
.row-act:hover{border-color:var(--brand);color:var(--brand-d)}
.row-act.on-done{background:var(--green-bg);border-color:var(--green);color:var(--green-ink)}
.row-act.on-snooze{background:var(--amber-bg);border-color:var(--amber);color:var(--amber-ink)}
.row-act:disabled{opacity:.4;cursor:not-allowed}
.cc-toggle{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
.cc-toggle input{width:15px;height:15px;accent-color:var(--brand);cursor:pointer}
.cc-toggle:hover{color:var(--ink)}
tr.r-done,.alert-card.r-done{opacity:.5}
tr.r-done .rc-name,.r-done .al-title{text-decoration:line-through}
tr.r-snooze,.alert-card.r-snooze{opacity:.74}
.work-summary{display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:.72rem;font-weight:700;color:var(--muted)}
.work-summary b{font-family:var(--num-ff);color:var(--text)}
.work-chip{display:inline-flex;align-items:center;gap:6px}
.work-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== DIAGNOSTIC ===== */
.diag{background:linear-gradient(118deg,#0F1620,#26303E);color:#E8EDF2;border-radius:var(--r-lg);padding:28px 30px;display:grid;grid-template-columns:1.5fr 1fr;gap:30px;align-items:center;position:relative;overflow:hidden}
html[data-theme="dark"] .diag{background:linear-gradient(120deg,#0C1218,#10202A);border:1px solid var(--line)}
.diag::after{content:"";position:absolute;right:-70px;top:-70px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,181,173,.20),transparent 70%)}
html[data-theme="dark"] .diag::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);box-shadow:0 0 22px var(--brand)}
.diag .tag{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#16C8BF;background:rgba(0,181,173,.13);border:1px solid rgba(0,181,173,.32);padding:5px 11px;border-radius:99px;margin-bottom:14px}
html[data-theme="dark"] .diag .tag{border-radius:6px;font-family:var(--mono)}
.diag h2{font-size:1.6rem;font-weight:800;line-height:1.24;letter-spacing:-.4px;color:#fff;text-wrap:balance}
.diag h2 em{font-style:normal;color:#16C8BF;background:linear-gradient(transparent 62%,rgba(0,181,173,.30) 62%)}
html[data-theme="dark"] .diag h2 em{background:none;text-shadow:0 0 18px rgba(22,200,191,.6)}
.diag p{font-size:.84rem;color:#9FAAB6;margin-top:12px;line-height:1.55}
.dstats{display:flex;gap:8px;position:relative;z-index:1}
.ds{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px}
.ds .v{font-size:1.4rem;font-weight:800;color:#fff;line-height:1;font-family:var(--num-ff)}
.ds .v.bad{color:#FF8A8E}.ds .v.good{color:#46D6A6}
.ds .l{font-size:.61rem;color:#8C97A4;margin-top:6px;font-weight:600;line-height:1.3}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform .18s ease,box-shadow .18s ease}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(15,22,32,.10)}
html[data-theme="dark"] .kpi:hover{box-shadow:0 0 0 1px color-mix(in srgb,var(--kc) 40%,transparent),0 8px 22px rgba(0,0,0,.4)}
.kpi-drill{position:absolute;top:10px;right:10px;font-size:.8rem;color:var(--faint);opacity:0;transition:opacity .18s ease,color .18s ease;z-index:2;line-height:1}
.kpi.clickable:hover .kpi-drill{opacity:1;color:var(--kc)}
.kpi.clickable:hover{cursor:pointer}
.kpi .ac{position:absolute;left:0;top:0;bottom:0;width:3px}
html[data-theme="dark"] .kpi .ac{top:0;bottom:auto;left:0;right:0;width:auto;height:2px;box-shadow:0 0 14px var(--kc)}
.ktop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kl{font-size:.66rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
html[data-theme="dark"] .kl{font-family:var(--mono);letter-spacing:1px}
.ki{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.kv{font-size:1.8rem;font-weight:var(--kpi-num-w);line-height:1;letter-spacing:-.5px;font-family:var(--num-ff)}
.ksub{font-size:.72rem;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
.delta{font-weight:800;font-size:.7rem;padding:1px 7px;border-radius:6px;font-family:var(--num-ff)}
.delta.up{color:var(--green-ink);background:var(--green-bg)}.delta.down{color:var(--red-ink);background:var(--red-bg)}

/* ===== CARDS / GRID ===== */
.grid2{display:grid;grid-template-columns:1.05fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.card.tight{padding:0;overflow:hidden}

/* ===== FUNNEL ===== */
.funnel{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.fstep{display:flex;align-items:center;gap:12px}
.fn{font-size:.76rem;font-weight:700;width:130px;text-align:right;flex-shrink:0;color:var(--text)}
html[data-theme="dark"] .fn{color:var(--muted)}
.fbar{height:34px;border-radius:7px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:800;font-size:.8rem;min-width:46px;font-family:var(--num-ff);transition:width .5s cubic-bezier(.4,0,.2,1)}
html[data-theme="dark"] .fbar{color:var(--brand-ink)}
.fp{width:42px;text-align:right;font-size:.74rem;color:var(--muted);font-weight:700;font-family:var(--num-ff)}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;font-size:.61rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);padding:11px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
html[data-theme="dark"] .tbl th{font-family:var(--mono);letter-spacing:1px}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:13px 11px;border-bottom:1px solid var(--line2)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--bg)}
html[data-theme="dark"] .tbl tbody tr:hover{background:var(--card2)}
/* totals footer row */
.tbl tfoot td{padding:13px 11px;font-weight:800;border-top:2px solid var(--line);background:color-mix(in srgb,var(--brand) 6%,var(--card));white-space:nowrap}
.tbl tfoot td:first-child{font-size:.7rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
html[data-theme="dark"] .tbl tfoot td{background:color-mix(in srgb,var(--brand) 12%,var(--card));border-top-color:color-mix(in srgb,var(--brand) 35%,var(--line))}
html[data-theme="dark"] .tbl tfoot td:first-child{font-family:var(--mono)}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-scroll>.tbl{min-width:100%;width:auto}
.who{display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.78rem;flex-shrink:0}
/* vendor avatar — per-vendor color gradient + initials/photo */
.avatar{position:relative;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;flex-shrink:0;font-family:'Hanken Grotesk',sans-serif;letter-spacing:.01em;
  background:linear-gradient(140deg,var(--ac),color-mix(in srgb,var(--ac) 52%,#0A0E13));
  box-shadow:0 2px 7px color-mix(in srgb,var(--ac) 38%,transparent),inset 0 1px 0 rgba(255,255,255,.28)}
.avatar>span{line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.28)}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.avatar.ring{box-shadow:0 0 0 2px var(--card),0 0 0 4px color-mix(in srgb,var(--ac) 50%,transparent),0 2px 8px color-mix(in srgb,var(--ac) 32%,transparent)}
html[data-theme="dark"] .avatar.ring{box-shadow:0 0 0 2px var(--card),0 0 0 4px color-mix(in srgb,var(--ac) 45%,transparent),0 0 15px color-mix(in srgb,var(--ac) 48%,transparent)}
.avatar .crown{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:linear-gradient(140deg,#FFD45E,#F5A301);color:#5A3E00;display:grid;place-items:center;border:2px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.wn{font-weight:700;line-height:1.15}.ww{font-size:.69rem;color:var(--faint);font-weight:600}
.mbar{height:7px;background:var(--line2);border-radius:99px;overflow:hidden;width:68px;display:inline-block;vertical-align:middle;margin-right:8px}
.mbar i{display:block;height:100%;border-radius:99px;background:var(--brand)}
html[data-theme="dark"] .mbar i{box-shadow:0 0 8px rgba(22,200,191,.6)}
.tag-new{font-size:.6rem;color:var(--blue);font-weight:800;margin-left:6px;font-family:var(--num-ff)}

/* ===== PILLS ===== */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:99px;font-family:var(--num-ff);white-space:nowrap;flex-shrink:0}
html[data-theme="dark"] .pill{border-radius:6px}
.pill .pd{width:7px;height:7px;border-radius:50%}
.pill.green{color:var(--green-ink);background:var(--green-bg)}.pill.green .pd{background:var(--green)}
.pill.amber{color:var(--amber-ink);background:var(--amber-bg)}.pill.amber .pd{background:var(--amber)}
.pill.red{color:var(--red-ink);background:var(--red-bg)}.pill.red .pd{background:var(--red)}
.pill.brand{color:var(--brand-d);background:var(--brand-bg)}.pill.brand .pd{background:var(--brand)}

/* ===== INSIGHT ===== */
.insight{background:var(--brand-bg);border:1px solid rgba(0,181,173,.28);border-radius:var(--r);padding:18px;display:flex;gap:13px;align-items:flex-start}
.insight .ic{width:36px;height:36px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;flex-shrink:0}
html[data-theme="dark"] .insight .ic{color:var(--brand-ink);box-shadow:var(--glow)}
.insight .t{font-size:.94rem;font-weight:800;color:var(--brand-ink)}
html[data-theme="dark"] .insight .t{color:#7DEAE3}
.insight .d{font-size:.8rem;color:#2C5C58;margin-top:4px;line-height:1.5}
html[data-theme="dark"] .insight .d{color:#9FC9C5}
.insight b{color:inherit;font-weight:800}
.insight.amber{background:var(--amber-bg);border-color:rgba(217,131,0,.3)}
.insight.amber .ic{background:var(--amber)}
.insight.amber .t,.insight.amber .d{color:var(--amber-ink)}.insight.green{background:var(--green-bg);border-color:rgba(21,154,87,.3)}.insight.green .ic{background:var(--green)}.insight.green .t,.insight.green .d{color:var(--green-ink)}

/* ===== TEAM CARDS ===== */
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border-top:3px solid var(--line);transition:transform .18s ease,box-shadow .18s ease}
.tcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(15,22,32,.12)}
html[data-theme="dark"] .tcard:hover{box-shadow:0 10px 26px rgba(0,0,0,.45)}
.tcard.green{border-top-color:var(--green)}.tcard.amber{border-top-color:var(--amber)}.tcard.red{border-top-color:var(--red)}
.tcard-h{padding:16px 17px 13px;display:flex;align-items:center;gap:11px}
.tcard-id{flex:1;min-width:0}
.tcard-name{font-weight:800;font-size:.92rem;line-height:1.15}
.tcard-where{font-size:.7rem;color:var(--faint);font-weight:600;margin-top:2px}
/* compact 2-line <24h stat (replaces the wrapping pill) */
.t24{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px;padding:5px 11px;border-radius:12px;text-align:right}
.t24-v{display:inline-flex;align-items:center;gap:5px;font-family:var(--num-ff);font-weight:800;font-size:.94rem;line-height:1;white-space:nowrap}
.t24-pd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.t24-l{font-size:.6rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;opacity:.72;white-space:nowrap}
.t24.green{background:var(--green-bg);color:var(--green-ink)}.t24.green .t24-pd{background:var(--green)}
.t24.amber{background:var(--amber-bg);color:var(--amber-ink)}.t24.amber .t24-pd{background:var(--amber)}
.t24.red{background:var(--red-bg);color:var(--red-ink)}.t24.red .t24-pd{background:var(--red)}
.t24.brand{background:var(--brand-bg);color:var(--brand-d)}.t24.brand .t24-pd{background:var(--brand)}
html[data-theme="dark"] .t24{border-radius:8px}
.tmetrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line2);border-top:1px solid var(--line2)}
.tm{background:var(--card);padding:13px 16px}
.tm .v{font-size:1.2rem;font-weight:800;line-height:1;font-family:var(--num-ff)}
.tm .l{font-size:.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.tcard-bar{padding:11px 17px;background:var(--bg);border-top:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--muted)}
.tcard-bar b{color:var(--text);font-weight:800}

/* progress meter */
.meter{height:8px;background:var(--line2);border-radius:99px;overflow:hidden}
.meter i{display:block;height:100%;border-radius:99px}

/* segmented */
.seg{display:inline-flex;background:var(--line2);border-radius:9px;padding:3px;gap:2px}
.seg button{border:none;background:none;font-family:inherit;font-weight:700;font-size:.74rem;color:var(--muted);padding:6px 14px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--card);color:var(--brand-d);box-shadow:var(--sh)}
html[data-theme="dark"] .seg button.on{background:var(--brand);color:var(--brand-ink)}

/* empty / placeholder note */
.note{font-size:.78rem;color:var(--muted);background:var(--bg);border:1px dashed var(--line);border-radius:var(--r);padding:14px 16px;line-height:1.55}

/* ===== brand logo in rail ===== */
.brand img.logo-img{height:30px;width:auto;display:block;filter:brightness(0) invert(1)}

/* ===== scroll progress + back-to-top ===== */
.scrollbar{position:fixed;top:0;left:230px;right:0;height:3px;background:linear-gradient(90deg,var(--brand),var(--blue));z-index:60;width:0;transition:width .08s linear;pointer-events:none}
html[data-theme="dark"] .scrollbar{box-shadow:0 0 10px var(--brand)}
.totop{position:fixed;bottom:22px;right:22px;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--brand-d);display:grid;place-items:center;cursor:pointer;box-shadow:var(--sh);z-index:55;opacity:0;transform:translateY(10px);transition:.2s;pointer-events:none}
.totop.show{opacity:1;transform:none;pointer-events:auto}
.totop:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
html[data-theme="dark"] .totop:hover{color:var(--brand-ink);box-shadow:0 0 18px rgba(22,200,191,.5)}

/* ===== presentation mode ===== */
body.pres .top .chip,body.pres .totop{display:none}
body.pres .kv{font-size:2.3rem}
body.pres .scroll{padding:32px 48px 60px}
body.pres .sh p{display:none}

/* ===== sparkline ===== */
.spark{display:block;width:100%;height:30px;margin-top:10px;overflow:visible}
.spark path.line{fill:none;stroke:var(--kc,var(--brand));stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.spark path.area{fill:var(--kc,var(--brand));opacity:.10}
.spark circle{fill:var(--kc,var(--brand))}
html[data-theme="dark"] .spark path.line{filter:drop-shadow(0 0 4px var(--kc,var(--brand)))}

/* ===== donut ===== */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.donut{flex-shrink:0}
.donut .track{fill:none;stroke:var(--line2);stroke-width:14}
.donut .seg{fill:none;stroke-width:14;stroke-linecap:butt;transition:stroke-dasharray .6s cubic-bezier(.4,0,.2,1),stroke-width .18s ease,opacity .18s ease;cursor:default}
.donut-center{font-family:var(--num-ff);font-weight:800}
.legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:160px}
.legend .lr{display:flex;align-items:center;gap:9px;font-size:.78rem}
.legend .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.legend .lv{margin-left:auto;font-weight:800;font-family:var(--num-ff)}

/* ===== heatmap ===== */
.heat{display:grid;gap:5px;margin-top:6px}
.heat .hrow{display:grid;grid-template-columns:150px repeat(var(--cols,4),1fr);gap:5px;align-items:center}
.heat .hname{font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:9px}
.heat .cell{height:34px;border-radius:7px;display:grid;place-items:center;font-size:.72rem;font-weight:800;font-family:var(--num-ff);color:#fff;position:relative;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.32);box-shadow:inset 0 1px 0 rgba(255,255,255,.22),inset 0 -5px 8px rgba(0,0,0,.14)}
html[data-theme="dark"] .heat .cell{box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),inset 0 1px 0 rgba(255,255,255,.16)}
.heat .hhead{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);text-align:center}
html[data-theme="dark"] .heat .hhead{font-family:var(--mono)}

/* ===== table: top row + critical rows + sticky head ===== */
.tbl thead th{position:sticky;top:-26px;background:var(--card);z-index:2}
body.pres .tbl thead th{top:-32px}
.tbl tr.toprow td{background:color-mix(in srgb,var(--brand) 8%,var(--card))}
.tbl tr.toprow:hover td{background:color-mix(in srgb,var(--brand) 13%,var(--card))}
.tbl tr.crit td:first-child{box-shadow:inset 3px 0 0 var(--red)}
.tbl tr.warn td:first-child{box-shadow:inset 3px 0 0 var(--amber)}

/* ===== tooltip ===== */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%);background:#0C121C;color:#fff;padding:8px 12px;border-radius:8px;font-size:.7rem;font-weight:500;line-height:1.5;text-align:center;white-space:normal;width:max-content;max-width:230px;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.3);pointer-events:none}
[data-tip]:hover::before{content:"";position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#0C121C;z-index:200;pointer-events:none}

/* ===== empty state ===== */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:46px 24px;text-align:center}
.empty-ic{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;background:var(--bg);border:1px solid var(--line);color:var(--faint)}
.empty-t{font-weight:700;font-size:.92rem;color:var(--text)}
.empty-d{font-size:.8rem;color:var(--muted);max-width:40ch;line-height:1.5}
.empty .btn{margin-top:4px}

/* ===== skeleton ===== */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
.skel{border-radius:8px;background:var(--line2);background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);background-size:200px 100%;background-repeat:no-repeat;animation:shimmer 1.1s infinite}
html[data-theme="dark"] .skel{background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

/* ===== diagnostic (clean, premium) ===== */
.diag2{display:grid;grid-template-columns:1.5fr 1fr;gap:30px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:30px 32px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.diag2::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--blue))}
.diag2::after{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--brand) 14%,transparent),transparent 70%);pointer-events:none}
html[data-theme="dark"] .diag2{background:linear-gradient(120deg,var(--card),#0E1822)}
.diag2-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--brand-d);background:var(--brand-bg);border:1px solid color-mix(in srgb,var(--brand) 30%,transparent);padding:5px 11px;border-radius:99px;margin-bottom:15px}
html[data-theme="dark"] .diag2-eyebrow{border-radius:6px;font-family:var(--mono)}
.diag2-h{font-size:1.55rem;font-weight:800;line-height:1.25;letter-spacing:-.4px;color:var(--text);text-wrap:balance}
.diag2-h em{font-style:normal;color:var(--brand-d);background:linear-gradient(transparent 60%,color-mix(in srgb,var(--brand) 28%,transparent) 60%)}
html[data-theme="dark"] .diag2-h em{background:none;color:var(--brand);text-shadow:0 0 16px rgba(22,200,191,.5)}
.diag2-p{font-size:.84rem;color:var(--muted);margin-top:13px;line-height:1.6;max-width:54ch}
.diag2-p b{color:var(--text);font-weight:700}
.diag2-cta{margin-top:16px;font-size:.78rem}

/* ===== resumen hero (factual, no slogan) ===== */
.rhero{display:grid;grid-template-columns:1.4fr 1fr;gap:30px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px 30px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.rhero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--blue))}
.rhero::after{content:"";position:absolute;right:-80px;top:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--brand) 12%,transparent),transparent 70%);pointer-events:none}
html[data-theme="dark"] .rhero{background:linear-gradient(120deg,var(--card),#0E1822)}
.rhero-line{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:1.05rem;color:var(--muted);font-weight:600}
.rhero-line b{font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-.5px}
.rhero-sep{width:1px;height:20px;background:var(--line);align-self:center}
.rhero-sub{font-size:.78rem;color:var(--faint);margin-top:12px;line-height:1.5}
@media(max-width:820px){.rhero{grid-template-columns:1fr;gap:22px}}
.diag2-stats{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
.diag2-stat{display:flex;align-items:center;gap:13px;background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--sc);border-radius:var(--r-sm);padding:13px 16px}
html[data-theme="dark"] .diag2-stat{background:rgba(255,255,255,.03)}
.diag2-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--sc) 14%,transparent);color:var(--sc);flex-shrink:0}
.diag2-v{font-size:1.35rem;font-weight:800;line-height:1;font-family:var(--num-ff);color:var(--text);white-space:nowrap}
.diag2-l{font-size:.66rem;color:var(--muted);font-weight:600;margin-top:4px}
@media(max-width:820px){.diag2{grid-template-columns:1fr;gap:22px}}
.diag2-refresh{border:none;background:var(--brand-bg);color:var(--brand-d);width:20px;height:20px;border-radius:6px;display:inline-grid;place-items:center;cursor:pointer;margin-left:4px;vertical-align:middle}
.diag2-refresh:hover{background:var(--brand);color:#fff}
.diag2-analyzing{display:flex;align-items:center;gap:7px;font-size:.78rem;color:#7A5AF0;font-weight:600;margin-top:12px}
html[data-theme="dark"] .diag2-analyzing{color:#A78BFA}
.diag2-skel-line{display:inline-block;width:90%;height:.85em;border-radius:5px;background:var(--line2);background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);background-size:200px 100%;background-repeat:no-repeat;animation:shimmer 1.1s infinite;vertical-align:middle}
html[data-theme="dark"] .diag2-skel-line{background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.diag-levers{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
@media(max-width:820px){.diag-levers{grid-template-columns:1fr}}
.diag-levers-col,.diag-risk{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.diag-risk{border-left:3px solid var(--red)}
.diag-risk-body{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:var(--text);line-height:1.55;color:var(--red-ink)}

/* ===== AI expert agents ===== */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.agent{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 22px;box-shadow:var(--sh);position:relative;overflow:hidden}
.agent::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac)}
.agent-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.agent-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:color-mix(in srgb,var(--ac) 14%,transparent);color:var(--ac);flex-shrink:0}
.agent-name{font-weight:800;font-size:.96rem;letter-spacing:-.2px}
.agent-role{font-size:.68rem;color:var(--faint);font-weight:600;margin-top:1px}
.agent-refresh{border:none;background:var(--bg);color:var(--muted);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;cursor:pointer;flex-shrink:0}
.agent-refresh:hover{background:var(--ac);color:#fff}
.agent-hint{font-size:.8rem;color:var(--muted);line-height:1.5;margin-top:6px}
.agent-loading{display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--ac);font-weight:600;margin-top:12px}
.agent-loading .ai-dot{background:var(--ac)}
.agent-body{margin-top:12px;animation:aiIn .4s ease-out}
.agent-resumen{font-size:.84rem;color:var(--text);line-height:1.55}
.agent-sec{margin-top:15px}
.agent-find{display:flex;align-items:flex-start;gap:9px;font-size:.81rem;color:var(--text);padding:6px 0;line-height:1.45}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.agent-rec{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:var(--text);padding:7px 0;border-bottom:1px solid var(--line2);line-height:1.45}
.agent-rec:last-child{border-bottom:none}
.agent-impacto{font-size:.72rem;color:var(--brand-d);margin-top:3px;font-weight:600}

/* ===== count-up helper (no layout shift) ===== */
.kv,.ds .v,.tm .v{font-variant-numeric:tabular-nums}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== animated bar growth on view enter ===== */
@media (prefers-reduced-motion:no-preference){
  @keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .bar-grow{transform-origin:bottom;animation:growBar .55s cubic-bezier(.4,0,.2,1)}
  @keyframes growW{from{width:0}}
  .view .meter i,.view .fbar,.view .bl-fill,.view .mbar i{animation:growW .6s cubic-bezier(.4,0,.2,1)}
}

/* ===== sortable table headers ===== */
.tbl th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.tbl th.sortable:hover{color:var(--brand-d)}
.tbl th .sort-ar{display:inline-block;width:10px;opacity:.5;font-size:.7em}
.tbl th.sorted .sort-ar{opacity:1;color:var(--brand-d)}

/* ===== vendor-card weekly sparkline ===== */
.tcard-spark{display:flex;align-items:flex-end;gap:3px;height:24px;padding:0 17px 12px}
.tcard-spark i{flex:1;border-radius:2px 2px 0 0;background:var(--line);min-height:2px}
.tcard-spark i.hi{background:var(--brand)}
html[data-theme="dark"] .tcard-spark i.hi{box-shadow:0 0 6px rgba(22,200,191,.6)}

/* ===== quadrant matrix ===== */
.quad{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);height:360px;overflow:hidden;box-shadow:var(--sh);padding:8px}
.quad .axis{position:absolute;background:var(--line)}
.quad .axyx{left:50%;top:14px;bottom:14px;width:1px}
.quad .axxy{top:50%;left:14px;right:14px;height:1px}
.quad .qlbl{position:absolute;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:10px 14px;pointer-events:none}
html[data-theme="dark"] .quad .qlbl{font-family:var(--mono)}
.quad .qpt{position:absolute;transform:translate(-50%,50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s}
.quad .qpt:hover{transform:translate(-50%,50%) scale(1.1);z-index:6}
.quad .qpt .qnm{font-size:.6rem;font-weight:700;color:var(--text);white-space:nowrap;background:var(--card);padding:1px 6px;border-radius:5px;border:1px solid var(--line);box-shadow:var(--sh)}
.quad .axhint{position:absolute;font-size:.55rem;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px;pointer-events:none}
.quad .axhint-x{bottom:6px;right:12px}
.quad .axhint-y{left:8px;top:12px;writing-mode:vertical-rl}
html[data-theme="dark"] .quad .axhint{font-family:var(--mono)}

/* ===== filter chips (alertas) ===== */
.fchip{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:.76rem;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:7px 14px;cursor:pointer;transition:.15s}
.fchip b{font-family:var(--num-ff);background:var(--bg);border-radius:99px;padding:0 7px;font-size:.7rem;color:var(--text)}
.fchip:hover{border-color:var(--fc);color:var(--fc)}
.fchip[data-on="true"]{background:color-mix(in srgb,var(--fc) 12%,transparent);border-color:var(--fc);color:var(--fc)}
.fchip[data-on="true"] b{background:var(--fc);color:#fff}

/* ===== AI analyst ===== */
.ai-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--sh);position:relative;overflow:hidden}
.ai-box::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#7A5AF0,var(--brand))}
.ai-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ai-badge{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#7A5AF0;background:color-mix(in srgb,#7A5AF0 12%,transparent);border:1px solid color-mix(in srgb,#7A5AF0 30%,transparent);padding:5px 11px;border-radius:99px}
html[data-theme="dark"] .ai-badge{font-family:var(--mono);border-radius:6px;color:#A78BFA}
.ai-btn{font-size:.78rem}
.ai-hint{font-size:.82rem;color:var(--muted);margin-top:12px;line-height:1.55;max-width:70ch}
.ai-loading{display:flex;align-items:center;gap:7px;font-size:.84rem;color:var(--muted);margin-top:16px;font-weight:600}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#7A5AF0;animation:aiPulse 1.2s infinite ease-in-out}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s;margin-right:6px}
@keyframes aiPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.ai-err{font-size:.8rem;color:var(--amber-ink);background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r-sm);padding:12px 15px;margin-top:14px;line-height:1.5}
.ai-result{margin-top:16px;animation:aiIn .4s ease-out}
@keyframes aiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ai-titular{font-size:1.3rem;font-weight:800;letter-spacing:-.3px;color:var(--text);line-height:1.3;text-wrap:balance}
.ai-diag{font-size:.86rem;color:var(--muted);margin-top:10px;line-height:1.6;max-width:72ch}
.ai-palancas{margin-top:18px}
.ai-sub{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:10px}
html[data-theme="dark"] .ai-sub{font-family:var(--mono)}
.ai-pal{display:flex;align-items:flex-start;gap:11px;font-size:.86rem;color:var(--text);padding:8px 0;border-bottom:1px solid var(--line2);line-height:1.5}
.ai-pal:last-child{border-bottom:none}
.ai-num{flex-shrink:0;width:22px;height:22px;border-radius:7px;background:var(--brand-bg);color:var(--brand-d);font-weight:800;font-size:.74rem;display:grid;place-items:center;font-family:var(--num-ff)}
.ai-riesgo{display:flex;align-items:center;gap:10px;margin-top:16px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r-sm);padding:11px 15px;font-size:.82rem;color:var(--red-ink);line-height:1.5}
@media (prefers-reduced-motion:no-preference){
  @keyframes alertIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .alert-card{animation:alertIn .3s ease-out both}
  .alert-card:nth-child(2){animation-delay:.04s}.alert-card:nth-child(3){animation-delay:.08s}
  .alert-card:nth-child(4){animation-delay:.12s}.alert-card:nth-child(5){animation-delay:.16s}
  .alert-card:nth-child(6){animation-delay:.2s}.alert-card:nth-child(7){animation-delay:.24s}
}

/* ===== vendor profile drawer (fichas desplegables) ===== */
.scrim{position:fixed;inset:0;background:rgba(15,22,32,.38);opacity:0;pointer-events:none;transition:opacity .25s;z-index:70}
.scrim.show{opacity:1;pointer-events:auto}
html[data-theme="dark"] .scrim{background:rgba(0,0,0,.42)}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:94vw;background:var(--bg);box-shadow:-12px 0 40px rgba(15,22,32,.25);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:71;display:flex;flex-direction:column}
.drawer.show{transform:none}
@media (prefers-reduced-motion:no-preference){
  @keyframes drSecIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .drawer.show .drawer-body>*{animation:drSecIn .35s ease-out both}
  .drawer.show .drawer-body>*:nth-child(2){animation-delay:.04s}
  .drawer.show .drawer-body>*:nth-child(3){animation-delay:.08s}
  .drawer.show .drawer-body>*:nth-child(4){animation-delay:.12s}
  .drawer.show .drawer-body>*:nth-child(5){animation-delay:.16s}
  .drawer.show .drawer-body>*:nth-child(6){animation-delay:.2s}
  .drawer.show .drawer-body>*:nth-child(n+7){animation-delay:.24s}
}
.drawer-head{background:var(--card);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.drawer-name{font-weight:800;font-size:1.1rem;letter-spacing:-.3px}
.drawer-close{border:none;background:var(--bg);width:34px;height:34px;border-radius:9px;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1;flex-shrink:0}
.drawer-close:hover{background:var(--line);color:var(--text)}
.drawer-body{padding:20px 22px 40px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
body.drawer-open .scroll{overflow:hidden}
body.drawer-open{overflow:hidden}
.dr-sec{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin:22px 0 11px}
.dr-sec:first-child{margin-top:0}
html[data-theme="dark"] .dr-sec{font-family:var(--mono)}
.dr-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dr-k{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.dr-k .v{font-size:1.2rem;font-weight:800;line-height:1;font-family:var(--num-ff)}
.dr-k .l{font-size:.64rem;color:var(--muted);font-weight:600;margin-top:5px;line-height:1.3}
.dr-mom{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;display:flex;align-items:baseline;gap:10px}
.dr-mom .big{font-size:1.6rem;font-weight:800;font-family:var(--num-ff);line-height:1}
.clickable{cursor:pointer}

/* ===== editable metas stepper ===== */
.metas-box{display:flex;flex-direction:column;gap:16px}
.meta-row .top{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;margin-bottom:7px;gap:10px;flex-wrap:wrap}
.meta-name{display:flex;align-items:center;gap:9px;font-weight:700}
.meta-right{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.meta-cerr{font-size:1rem;font-weight:800;font-family:var(--num-ff)}
.meta-proy{font-size:.72rem;color:var(--muted)}
.meta-stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
.meta-stepper button{border:none;background:var(--bg);width:26px;height:28px;font-size:1rem;color:var(--muted);cursor:pointer;line-height:1;font-family:inherit;display:grid;place-items:center}
.meta-stepper button:hover{background:var(--brand);color:#fff}
.meta-pre{padding:0 1px 0 8px;color:var(--muted);font-size:.78rem;font-family:var(--num-ff)}
.meta-input{border:none;background:transparent;color:var(--text);font-family:var(--num-ff);font-weight:700;font-size:.82rem;width:78px;text-align:right;padding:5px 8px 5px 2px;outline:none}
.meta-input:focus{background:color-mix(in srgb,var(--brand) 10%,transparent)}
.meta-bar{height:11px;background:var(--line2);border-radius:99px;overflow:hidden;position:relative}
.meta-bar i{display:block;height:100%;border-radius:99px}
.meta-bar .proy{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink)}
html[data-theme="dark"] .meta-bar .proy{background:#fff;box-shadow:0 0 5px #fff}
.meta-total{border-top:2px solid var(--line);padding-top:14px;margin-top:2px}

/* ===== history dropdown ===== */
.hist{position:relative}
.hist-menu{position:absolute;top:calc(100% + 7px);right:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 10px 30px rgba(15,22,32,.18);min-width:170px;z-index:80;overflow:hidden;padding:5px}
html[data-theme="dark"] .hist-menu{box-shadow:0 10px 30px rgba(0,0,0,.5)}
.hist-menu a{display:flex;align-items:center;gap:9px;padding:9px 11px;font-size:.8rem;font-weight:600;color:var(--text);text-decoration:none;border-radius:7px}
.hist-menu a:hover{background:var(--bg);color:var(--brand-d)}
.hist-menu a.cur{color:var(--brand-d);background:var(--brand-bg)}
.hist-menu .lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:6px 11px 4px}
html[data-theme="dark"] .hist-menu .lbl{font-family:var(--mono)}
/* subtle texture on the diagnostic banner (drop a real photo behind via --diag-photo) */
.diag{background-image:linear-gradient(118deg,#0F1620,#26303E),repeating-linear-gradient(135deg,rgba(255,255,255,.02) 0 2px,transparent 2px 9px)}
html[data-theme="dark"] .diag{background-image:linear-gradient(120deg,#0C1218,#10202A),repeating-linear-gradient(135deg,rgba(22,200,191,.03) 0 2px,transparent 2px 9px)}

/* ============================================================================
   PRESENTACIÓN (board-ready) — header temporal, MoM, ranking, sucursales, TV
   ========================================================================== */
.pres-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pres-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--brand-d);background:var(--brand-bg);border:1px solid var(--brand-border,transparent);padding:6px 11px;border-radius:99px}
html[data-theme="dark"] .pres-eyebrow{font-family:var(--mono);border-radius:6px}

/* temporal header band (hero) */
.pres-head{position:relative;display:flex;align-items:center;justify-content:space-between;gap:30px;flex-wrap:wrap;overflow:hidden;background:linear-gradient(115deg,var(--card) 40%,color-mix(in srgb,var(--brand) 10%,var(--card)));border:1px solid var(--line);border-radius:var(--r-lg);padding:26px 32px}
html[data-theme="dark"] .pres-head{background:linear-gradient(115deg,#0E1A22,#0C1A28)}
.pres-head-glow{position:absolute;top:-60%;right:6%;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--brand) 20%,transparent),transparent 65%);pointer-events:none}
.pres-head-l{position:relative;z-index:1}
.pres-kicker{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--brand-d);margin-bottom:8px}
html[data-theme="dark"] .pres-kicker{font-family:var(--mono)}
.pres-month{font-size:2.6rem;font-weight:800;letter-spacing:-1px;line-height:.95}
.pres-month span{color:var(--muted);font-weight:700}
.pres-day{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:.9rem;color:var(--muted);margin-top:13px}
.pres-day b{color:var(--text);font-weight:800}
.pres-day-pill{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;background:var(--brand-bg);color:var(--brand-d);font-weight:800;font-size:.78rem;padding:5px 12px;border-radius:99px}
html[data-theme="dark"] .pres-day-pill{border-radius:6px;font-family:var(--mono)}
/* progress ring */
.pres-ring{position:relative;width:128px;height:128px;flex-shrink:0;z-index:1}
.pres-ring svg{width:100%;height:100%}
.pres-ring circle{transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.pres-ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.pres-ring-c b{font-size:1.9rem;font-weight:800;letter-spacing:-1px;line-height:1}
.pres-ring-c b i{font-size:1rem;font-style:normal;color:var(--muted);margin-left:1px}
.pres-ring-c span{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint)}

/* global stat tiles */
.pstats{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px;margin-top:14px}
.pstat{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px 15px;box-shadow:var(--sh);overflow:hidden;transition:transform .16s,box-shadow .16s}
.pstat:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(15,22,32,.08)}
.pstat::after{content:"";position:absolute;top:-34px;right:-34px;width:92px;height:92px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--pc) 16%,transparent),transparent 70%);pointer-events:none}
.pstat-ac{position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc)}
.pstat-l{font-size:.66rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
html[data-theme="dark"] .pstat-l{font-family:var(--mono)}
.pstat-v{font-size:1.8rem;font-weight:800;line-height:1;letter-spacing:-.5px;margin-top:10px;font-family:var(--num-ff);position:relative}
.pstat-foot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.pstat-sub{font-size:.66rem;color:var(--faint);font-weight:600}

/* MoM pill */
.mom{display:inline-flex;align-items:center;gap:3px;font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:99px;font-family:var(--num-ff);white-space:nowrap;line-height:1.5}
.mom.up{color:var(--green-ink);background:var(--green-bg)}
.mom.down{color:var(--red-ink);background:var(--red-bg)}
.mom.flat{color:var(--muted);background:var(--line2)}
.mom-new{color:var(--blue);background:color-mix(in srgb,var(--blue) 12%,transparent)}
html[data-theme="dark"] .mom{border-radius:5px}
td .mom{margin-top:3px}

/* podium / ranking */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:end;margin-top:6px}
.pod{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:30px 16px 18px;text-align:center;cursor:pointer;transition:transform .18s,box-shadow .18s}
.pod:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.pod-2{order:1}.pod-1{order:2}.pod-3{order:3}
.pod-1{padding-top:38px;background:linear-gradient(168deg,color-mix(in srgb,var(--medal) 14%,var(--card)),var(--card) 52%);border-color:color-mix(in srgb,var(--medal) 50%,var(--line));box-shadow:0 10px 34px color-mix(in srgb,var(--medal) 22%,transparent)}
.pod-medal{position:absolute;top:-17px;left:50%;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-family:var(--num-ff);color:#fff;background:var(--medal);border:3px solid var(--card);box-shadow:0 4px 12px color-mix(in srgb,var(--medal) 55%,transparent)}
.pod-1 .pod-medal{width:42px;height:42px;top:-21px;font-size:1.15rem}
.pod-name{font-weight:800;font-size:1.05rem;margin-top:11px}
.pod-1 .pod-name{font-size:1.2rem}
.pod-suc{font-size:.7rem;color:var(--muted);margin-top:2px}
.pod-metric{font-size:1.1rem;font-weight:800;color:var(--brand-d);margin-top:10px}
.pod-1 .pod-metric{font-size:1.35rem}
.lb-rest{display:flex;flex-direction:column;margin-top:10px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid var(--line2);background:var(--card)}
.lb-row:last-child{border-bottom:none}
.lb-pos{width:22px;text-align:center;font-weight:800;color:var(--faint)}
.lb-nm{font-weight:700;font-size:.86rem;flex:1}
.lb-mt{font-weight:800;color:var(--brand-d)}

/* per-vendor table — value + MoM stacked */
.pres-tbl td{vertical-align:middle}
.pres-tbl td.r .num{line-height:1.15}

/* matriz transpuesta: vendedoras en columnas, métricas en filas */
.matrix-wrap{overflow-x:auto;margin-top:6px}
.pres-matrix{width:100%;border-collapse:collapse;min-width:560px}
.pres-matrix th,.pres-matrix td{padding:13px 14px;border-bottom:1px solid var(--line2);text-align:center}
.pres-matrix thead th{border-bottom:2px solid var(--line);vertical-align:bottom}
.pres-matrix .rowhead{position:sticky;left:0;z-index:1;text-align:left;white-space:nowrap;background:var(--card)}
.pres-matrix td.rowhead{font-weight:700;font-size:.84rem;color:var(--text)}
.pres-matrix th.rowhead{font-size:.66rem;text-transform:uppercase;letter-spacing:.6px;font-weight:700;color:var(--faint)}
.pres-matrix .vhead{cursor:pointer;transition:background .14s}
.pres-matrix .vhead:hover{background:var(--bg)}
.pres-matrix .vhead-in{display:flex;flex-direction:column;align-items:center;gap:7px}
.pres-matrix .vhead-nm{font-weight:800;font-size:.9rem;line-height:1.05}
.pres-matrix .vhead-nm span{display:block;font-weight:600;font-size:.66rem;color:var(--muted);margin-top:2px}
.pres-matrix .vhead.toph .vhead-nm{color:var(--brand-d)}
.pres-matrix tbody tr:hover{background:var(--bg)}
.pres-matrix .mcell .num{line-height:1.1}
.pres-matrix .mcell .mom{margin-top:4px}
.pres-matrix .topcol{background:color-mix(in srgb,var(--brand) 5%,transparent)}
.pres-matrix .vhead.toph{background:color-mix(in srgb,var(--brand) 8%,transparent)}
.pres-matrix tbody tr:last-child td{border-bottom:none}

/* presentation (Modo TV) variant of the transposed matrix — larger, with a team-total column */
.spot-matrix{min-width:0;font-size:1.02rem}
.spot-matrix th,.spot-matrix td{padding:7px 3px}
.spot-matrix thead th{padding-bottom:8px}
.spot-matrix td.rowhead,.spot-matrix th.rowhead{padding-right:8px}
.spot-matrix .rowhead{background:transparent}
.spot-matrix td.rowhead{font-size:.92rem;font-weight:800}
.spot-matrix th.rowhead{font-size:.72rem}
.spot-matrix .vhead-in{gap:4px}
.spot-matrix .vhead-nm{font-size:1rem}
.spot-matrix .vhead-nm span{font-size:.7rem}
.spot-matrix .mcell .num{font-size:.95rem;font-weight:800;white-space:nowrap}
.spot-matrix .mcell-in{display:inline-flex;align-items:baseline;gap:6px;justify-content:center}
/* clean MoM in the dense matrix: no fill, no pulse — just a small colored arrow + faint % */
.spot-matrix .mcell .mom{margin-top:0;font-size:.62rem;font-weight:700;padding:0;background:none!important;border-radius:0;gap:1px;animation:none!important;box-shadow:none!important;opacity:.92}
.spot-matrix .mcell .mom.up{color:var(--green)}
.spot-matrix .mcell .mom.down{color:var(--red)}
.spot-matrix .mcell .mom.flat{color:var(--faint)}
.spot-matrix .mcell .mom-new{color:var(--blue);background:none!important;padding:0;font-size:.56rem;text-transform:uppercase;letter-spacing:.4px;opacity:.8}
.spot-matrix .totcol{background:color-mix(in srgb,var(--brand) 7%,transparent);border-left:2px solid var(--line)}
.spot-matrix th.totcol{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;font-weight:800;color:var(--brand-d);vertical-align:bottom}
html[data-theme="dark"] .spot-matrix .totcol{background:color-mix(in srgb,var(--brand) 14%,transparent)}
/* keep presentation matrix headers in the body font (no mono/letter-spacing) so dark width matches light */
html[data-theme="dark"] .spot-matrix th,html[data-theme="dark"] .spot-matrix .vhead-nm{font-family:inherit;letter-spacing:normal}

/* origen manual vs bot */
.origen-row{display:flex;align-items:center;gap:14px;padding:8px 0;border-bottom:1px solid var(--line2)}
.origen-row:last-of-type{border-bottom:none}
.origen-bar{flex:1;display:flex;height:14px;border-radius:99px;overflow:hidden;background:var(--line2);min-width:120px}
.origen-bar .man{background:var(--green)}
.origen-bar .bot{background:var(--faint)}
.origen-vals{width:188px;flex-shrink:0;text-align:right;font-size:.76rem;color:var(--muted)}
.origen-legend{display:flex;gap:20px;margin-top:14px;font-size:.74rem;color:var(--muted)}
.origen-legend span{display:inline-flex;align-items:center;gap:7px}
.origen-legend .sw{width:11px;height:11px;border-radius:3px}

/* per-branch cards */
.pres-branch{cursor:pointer;transition:transform .15s,box-shadow .15s}
.pres-branch:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.pres-branch-h{display:flex;align-items:center;gap:10px}
.pres-branch-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.pres-branch-n{font-weight:800;font-size:1rem}
.pres-branch-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:16px}
.pres-branch-grid .bv{font-size:1.4rem;font-weight:800;line-height:1}
.pres-branch-grid .bl{font-size:.64rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin:3px 0 5px}
.pres-branch-meta{margin-top:16px;padding-top:14px;border-top:1px solid var(--line2)}
.pres-branch-meta-h{display:flex;justify-content:space-between;align-items:baseline;font-size:.72rem;color:var(--muted);margin-bottom:7px}

/* team meta */
.pres-team-meta-h{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pres-team-v{font-size:1.7rem;font-weight:800;margin-top:4px}
.pres-team-pct{font-size:2.4rem;font-weight:800;line-height:1}

/* ===== SPOTLIGHT / MODO TV ===== */
.spot{position:fixed;inset:0;z-index:120;background:var(--bg);display:flex;flex-direction:column;padding:24px clamp(20px,5vw,70px) 22px;animation:fade .2s ease}
.spot-prog{position:absolute;top:0;left:0;right:0;height:4px;background:var(--line2);z-index:3}
.spot-prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--blue));animation:spotbar linear forwards}
@keyframes spotbar{from{width:0}to{width:100%}}
.spot-top-r{display:flex;align-items:center;gap:10px}
@keyframes fade{from{opacity:0}to{opacity:1}}
.spot-top{display:flex;align-items:center;justify-content:space-between}
.spot-eyebrow{font-size:.66rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--brand-d)}
html[data-theme="dark"] .spot-eyebrow{font-family:var(--mono)}
.spot-x{border:none;background:var(--card);border:1px solid var(--line);width:40px;height:40px;border-radius:11px;font-size:1.5rem;color:var(--muted);cursor:pointer;line-height:1}
.spot-x:hover{background:var(--line);color:var(--text)}
.spot-stage{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:safe center;gap:26px;max-width:1100px;width:100%;margin:0 auto;overflow-y:auto;animation:vin .3s ease-out}
.spot-who{display:flex;align-items:center;gap:20px}
.spot-who>div{min-width:0}
.spot-name{font-size:2rem;font-weight:800;letter-spacing:-.6px;line-height:1.12;white-space:nowrap;display:flex;align-items:center;gap:12px}
.spot-suc{font-size:1rem;color:var(--muted);font-weight:600;margin-top:6px}
.spot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.spot-tile{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--tc);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh)}
.spot-tl{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.spot-tv{font-size:2.4rem;font-weight:800;line-height:1;letter-spacing:-.8px;margin:12px 0 10px;font-family:var(--num-ff)}
.spot-meta-h{display:flex;justify-content:space-between;align-items:baseline;gap:14px;font-size:.92rem;color:var(--muted);margin-bottom:9px;white-space:nowrap}
.spot-meta-h b{color:var(--text)}
.spot-ctrl{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:18px}
.spot-dots{display:flex;gap:8px;margin-left:14px}
.spot-dots span{width:9px;height:9px;border-radius:50%;background:var(--line);cursor:pointer;transition:.15s}
.spot-dots span.on{background:var(--brand);transform:scale(1.25)}
@media(max-width:720px){.spot-grid{grid-template-columns:1fr 1fr}.spot-tv{font-size:1.9rem}.spot-name{font-size:1.6rem}}

/* spotlight slides: portada global */
.spot-stage>*{width:100%}
.spot-head{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.spot-kicker{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--brand-d)}
html[data-theme="dark"] .spot-kicker{font-family:var(--mono)}
.spot-title{font-size:2.6rem;font-weight:800;letter-spacing:-1px;line-height:1;margin-top:8px}
.spot-title span{color:var(--muted);font-weight:700}
.spot-sub{font-size:1rem;color:var(--muted);margin-top:10px}
.spot-sub b{color:var(--text);font-weight:800}
/* section header (ranking / table / branches) */
.spot-section-h{font-size:1.5rem;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.spot-stage-table{gap:10px;max-width:1240px}
.spot-stage-table .spot-section-h{margin-bottom:0;font-size:1.3rem}
/* ranking */
.spot-podium{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:end}
.spot-pod{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:30px 16px 20px;text-align:center}
.spot-pod-2{order:1}.spot-pod-1{order:2}.spot-pod-3{order:3}
.spot-pod-1{padding-top:40px;background:linear-gradient(168deg,color-mix(in srgb,var(--medal) 16%,var(--card)),var(--card) 52%);border-color:color-mix(in srgb,var(--medal) 50%,var(--line));box-shadow:0 12px 36px color-mix(in srgb,var(--medal) 24%,transparent)}
.spot-pod-medal{position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-family:var(--num-ff);color:#fff;background:var(--medal);border:3px solid var(--card);box-shadow:0 4px 12px color-mix(in srgb,var(--medal) 55%,transparent)}
.spot-pod-1 .spot-pod-medal{width:44px;height:44px;top:-22px;font-size:1.2rem}
.spot-pod-name{font-weight:800;font-size:1.2rem;margin-top:12px}
.spot-pod-suc{font-size:.8rem;color:var(--muted);margin-top:2px}
.spot-pod-metric{font-size:1.3rem;font-weight:800;color:var(--brand-d);margin-top:10px}
.spot-lb{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-top:14px}
.spot-lb-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line2);background:var(--card);font-size:1rem}
.spot-lb-row:last-child{border-bottom:none}
.spot-lb-row .pos{width:24px;text-align:center;font-weight:800;color:var(--faint)}
.spot-lb-row .nm{flex:1;font-weight:700}
.spot-lb-row b{color:var(--brand-d);white-space:nowrap}
/* table slide */
.spot-table{width:100%;border-collapse:collapse;font-size:1.05rem}
.spot-table th{text-align:left;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:0 16px 12px;border-bottom:2px solid var(--line)}
.spot-table th.r,.spot-table td.r{text-align:right}
.spot-table td{padding:13px 12px;border-bottom:1px solid var(--line2)}
.spot-table th,.spot-table td{white-space:nowrap}
.spot-table .who{display:flex;align-items:center;gap:11px;font-weight:700}
.spot-table-tot td{border-top:2px solid var(--line);border-bottom:none;font-weight:800;color:var(--text);background:var(--bg)}
.spot-table-tot td:first-child{font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
/* branches slide */
.spot-branches{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.spot-branch{background:var(--card);border:1px solid var(--line);border-top:4px solid;border-radius:var(--r-lg);padding:20px 22px}
.spot-branch-n{font-size:1.3rem;font-weight:800;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.spot-branch-n span{font-size:.74rem;font-weight:600;color:var(--muted)}
.spot-branch-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.spot-branch-grid .bv{font-size:1.7rem;font-weight:800;line-height:1}
.spot-branch-grid .bl{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.spot-branch-meta{display:flex;align-items:baseline;justify-content:space-between;gap:10px;font-size:.84rem;color:var(--muted);margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--line2);flex-wrap:wrap}
.spot-branch-meta b{font-size:.95rem;white-space:nowrap}
.spot-branch-grid .mom{margin-top:6px}
.spot-branch-mom{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);margin-top:7px}
.spot-branch-mom .mom{font-size:.74rem}
@media(max-width:900px){.spot-branches{grid-template-columns:1fr}.spot-podium{gap:10px}}

/* ===== PRINT / PDF ===== */
@media print{
  @page{margin:12mm}
  .rail,.top,.scrollbar,.totop,.no-print,.spot{display:none!important}
  .main{display:block}
  .scroll{overflow:visible!important;padding:0!important;display:block!important}
  .view{gap:16px!important;animation:none!important}
  body{background:#fff!important;display:block!important}
  .card,.pstat,.pod,.pres-head,.pres-branch{box-shadow:none!important;break-inside:avoid}
  .pres-head,.pstats,.podium,.grid3{break-inside:avoid}
}

/* ============================================================================
   LIQUID GLASS SIDEBAR (experimento) — autocontenido.
   Para revertir: borra este bloque entero. Solo afecta al sidebar (.rail).
   ========================================================================== */
/* (1) AMBIENT MESH — painted into the body's left strip only (fixed), so it
   fills the gaps around the floating slab AND is what the glass refracts via
   backdrop-filter. The content area (x>262) keeps the original --bg. */
body{
  background-color:var(--bg);
  background-image:
    radial-gradient(70% 50% at 26% 4%, #25c2b6, transparent 66%),
    radial-gradient(76% 54% at 92% 32%, #1f8088, transparent 66%),
    radial-gradient(80% 56% at 12% 92%, #176a72, transparent 68%),
    radial-gradient(58% 44% at 95% 96%, #2ccdbe, transparent 66%),
    linear-gradient(165deg,#0f2a30,#0d2228);
  background-repeat:no-repeat;
  background-size:262px 100%;
  background-position:left top;
  background-attachment:fixed;
}


/* (2) THE GLASS SLAB — floats off every edge, rounded, translucent so the
   mesh shows through the backdrop blur (real refraction, not baked color). */
.rail{
  position:sticky;top:16px;z-index:1;
  height:calc(100vh - 32px);
  margin:16px;
  border-radius:28px;
  background:
    radial-gradient(80% 30% at 50% 0%, rgba(38,200,185,.18), transparent 60%),
    radial-gradient(80% 32% at 50% 100%, rgba(20,130,135,.20), transparent 60%),
    linear-gradient(158deg, rgba(14,30,34,.42), rgba(8,20,24,.68));
  -webkit-backdrop-filter:blur(26px) saturate(150%);
  backdrop-filter:blur(26px) saturate(150%);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.22),
    inset 0 0 0 1px rgba(255,255,255,.04),
    inset 0 -20px 40px rgba(6,10,16,.45),
    0 26px 60px rgba(6,10,18,.50);
  overflow:hidden;
  isolation:isolate;
}
/* specular sheen — bright top edge + corner light, like glass catching light */
.rail::before{
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 18%),
    radial-gradient(72% 24% at 30% -3%, rgba(255,255,255,.22), transparent 60%),
    radial-gradient(60% 40% at 108% 8%, rgba(150,235,225,.16), transparent 55%);
  mix-blend-mode:screen;
}
/* frosted micro-grain */
.rail::after{
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='.045'/></svg>");
}
.rail > *{position:relative;z-index:1}

/* (3) BRAND — darker frosted header so the white logo + title pop on the glass */
.brand{margin:8px 8px 0;padding:18px 16px 16px;border-bottom:none;border-radius:18px;
  background:linear-gradient(180deg, rgba(6,14,18,.34), rgba(6,14,18,.14));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14), inset 0 0 0 1px rgba(255,255,255,.05)}
.brand img.logo-img{filter:brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,.55))}
.brand .h{text-shadow:0 1px 6px rgba(0,0,0,.45)}
.brand .s{color:rgba(214,228,228,.66)}

/* (3) NAV — items lift on hover; active is a raised glass lozenge with a side rail */
.ni{position:relative}
.ni:hover{background:rgba(255,255,255,.09);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);transform:translateX(2px)}
.ni.active{
  background:linear-gradient(180deg, color-mix(in srgb,var(--brand) 86%,#fff 14%), var(--brand));
  transform:translateX(2px);
  box-shadow:
    0 8px 22px rgba(0,181,173,.38),
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -2px 6px rgba(0,90,85,.35);
}
.ni.active::before{
  content:"";position:absolute;left:-9px;top:18%;bottom:18%;width:4px;border-radius:99px;
  background:#fff;box-shadow:0 0 12px rgba(255,255,255,.9),0 0 4px var(--brand);
}

/* (3) FOOT — frosted status footer */
.foot{margin:0 8px 8px;padding:14px 16px;border-top:none;border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}

/* progress bar starts after the floating slab */
.scrollbar{left:262px}

/* dark theme keeps the same form, deeper mesh */
html[data-theme="dark"] body{
  background-image:
    radial-gradient(70% 50% at 26% 4%, #138b83, transparent 66%),
    radial-gradient(76% 54% at 92% 32%, #145e66, transparent 66%),
    radial-gradient(80% 56% at 12% 92%, #0f4f56, transparent 68%),
    linear-gradient(165deg,#0a1e22,#081619);
}
html[data-theme="dark"] .rail{
  background:linear-gradient(158deg, rgba(12,20,30,.55), rgba(5,9,15,.78));
}

/* ============================================================================
   LIQUID GLASS — DAY (light theme). Luminous frosted-white glass; nav text +
   logo are dark/teal. The default/dark rules above become NIGHT (dark theme).
   ========================================================================== */
html:not([data-theme="dark"]) body{
  background-color:var(--bg);
  background-image:
    radial-gradient(70% 50% at 26% 4%, #a6ece4, transparent 66%),
    radial-gradient(76% 54% at 92% 32%, #cdeeea, transparent 66%),
    radial-gradient(80% 56% at 12% 92%, #b6e6ea, transparent 68%),
    radial-gradient(58% 44% at 95% 96%, #8fe3d7, transparent 66%),
    linear-gradient(165deg,#e4f5f2,#d4ece9);
}
html:not([data-theme="dark"]) .rail{
  background:
    radial-gradient(80% 30% at 50% 0%, rgba(255,255,255,.74), transparent 60%),
    radial-gradient(80% 32% at 50% 100%, rgba(38,200,185,.10), transparent 60%),
    linear-gradient(158deg, rgba(255,255,255,.84), rgba(255,255,255,.62));
  border:1px solid rgba(255,255,255,.78);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    inset 0 0 0 1px rgba(255,255,255,.45),
    inset 0 -22px 44px rgba(150,200,198,.15),
    0 26px 58px rgba(40,95,92,.20);
  color:#2c4a47;
}
html:not([data-theme="dark"]) .rail::before{
  background:
    linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,0) 20%),
    radial-gradient(72% 24% at 30% -3%, rgba(255,255,255,.72), transparent 60%);
  mix-blend-mode:normal;
}
html:not([data-theme="dark"]) .rail::after{opacity:.26}
/* nav text → dark teal-slate */
html:not([data-theme="dark"]) .nl{color:#5e8682}
html:not([data-theme="dark"]) .ni{color:#27514c}
html:not([data-theme="dark"]) .ni:hover{background:rgba(2,60,55,.07);color:#0d3a36}
html:not([data-theme="dark"]) .ni.active{
  background:linear-gradient(180deg, color-mix(in srgb,var(--brand) 86%,#fff 14%), var(--brand));
  color:#fff;
  box-shadow:0 8px 22px rgba(0,181,173,.34), inset 0 1px 0 rgba(255,255,255,.55);
}
html:not([data-theme="dark"]) .ni.active .bdg{background:rgba(255,255,255,.30);color:#063a36}
html:not([data-theme="dark"]) .ni.active::before{background:var(--brand);box-shadow:0 0 10px rgba(0,181,173,.65)}
/* brand: light frosted header, real teal logo */
html:not([data-theme="dark"]) .brand{
  background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.22));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
html:not([data-theme="dark"]) .brand img.logo-img{filter:none;opacity:.97}
html:not([data-theme="dark"]) .brand .h{color:#0f302d;text-shadow:none}
html:not([data-theme="dark"]) .brand .s{color:#5e8682}
/* foot */
html:not([data-theme="dark"]) .foot{
  background:linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,.16));
  color:#5e8682;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}

/* ============================================================================
   LIQUID GLASS — CONTENT (ambient + top bar + cards + buttons). Follows the
   theme like the sidebar. Soft aurora behind content gives the glass something
   to refract; cards stay opaque enough to keep data legible.
   Remove this block to revert to flat content.
   ========================================================================== */
.main{position:relative;z-index:0}
/* soft ambient aurora behind the content (fixed, calm) */
html:not([data-theme="dark"]) .main{
  background:
    radial-gradient(1000px 720px at 80% -14%, rgba(38,200,185,.22), transparent 60%),
    radial-gradient(900px 820px at 116% 48%, rgba(86,138,228,.16), transparent 60%),
    radial-gradient(840px 740px at 46% 118%, rgba(122,90,240,.10), transparent 62%),
    radial-gradient(700px 600px at 8% 60%, rgba(38,200,185,.10), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
html[data-theme="dark"] .main{
  background:
    radial-gradient(1000px 720px at 80% -14%, rgba(22,200,191,.18), transparent 60%),
    radial-gradient(900px 820px at 116% 48%, rgba(46,86,176,.20), transparent 60%),
    radial-gradient(840px 740px at 46% 118%, rgba(122,90,240,.12), transparent 62%),
    radial-gradient(700px 600px at 8% 60%, rgba(22,200,191,.08), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}

/* glass tokens per theme */
html:not([data-theme="dark"]){
  --glass:linear-gradient(180deg, rgba(255,255,255,.60), rgba(255,255,255,.40));
  --glass-soft:linear-gradient(180deg, rgba(255,255,255,.46), rgba(255,255,255,.28));
  --glass-panel:linear-gradient(180deg, rgba(255,255,255,.80), rgba(255,255,255,.64));
  --glass-brd:rgba(255,255,255,.78);
  --glass-hi:inset 0 1px 0 rgba(255,255,255,.92);
  --glass-sh:0 12px 32px rgba(40,90,88,.13);
}
html[data-theme="dark"]{
  --glass:linear-gradient(180deg, rgba(32,42,55,.50), rgba(16,22,30,.40));
  --glass-soft:linear-gradient(180deg, rgba(34,44,57,.38), rgba(16,22,30,.30));
  --glass-panel:linear-gradient(180deg, rgba(24,32,43,.74), rgba(13,18,25,.64));
  --glass-brd:rgba(255,255,255,.13);
  --glass-hi:inset 0 1px 0 rgba(255,255,255,.13);
  --glass-sh:0 14px 32px rgba(0,0,0,.48);
}

/* top bar → frosted glass */
.top{
  background:var(--glass-soft)!important;
  -webkit-backdrop-filter:blur(18px) saturate(170%);
  backdrop-filter:blur(18px) saturate(170%);
  border-bottom:1px solid var(--glass-brd);
}

/* card family → frosted glass (accents/left-bars are preserved by their own rules) */
.card,.kpi,.pstat,.tcard,.agent,.ai-box,.diag2,.rhero,.quad,
.diag-levers-col,.diag-risk,.spot-branch,
.pres-head,.pod,.pres-branch,.lb-rest{
  background:var(--glass);
  -webkit-backdrop-filter:blur(20px) saturate(165%);
  backdrop-filter:blur(20px) saturate(165%);
  border-color:var(--glass-brd);
  box-shadow:var(--glass-hi),var(--glass-sh);
}
/* keep the #1 podium standing out as a gold-tinted glass */
.pod-1{
  background:linear-gradient(168deg, color-mix(in srgb,var(--medal) 26%,transparent), transparent 62%), var(--glass);
  border-color:color-mix(in srgb,var(--medal) 48%,var(--glass-brd));
  box-shadow:var(--glass-hi),0 16px 38px color-mix(in srgb,var(--medal) 26%,transparent);
}
/* pres-head keeps its corner glow child; just sits on glass now */
.pres-head-glow{z-index:0}
/* dark theme set explicit gradients on these — override to glass */
html[data-theme="dark"] .diag2,html[data-theme="dark"] .rhero{background:var(--glass)}

/* buttons & chips → subtle glass (primary stays solid for contrast) */
.btn{
  background:var(--glass-soft);
  -webkit-backdrop-filter:blur(8px) saturate(150%);
  backdrop-filter:blur(8px) saturate(150%);
  border-color:var(--glass-brd);
}
.chip{
  background:var(--glass-soft);border-color:var(--glass-brd);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}

/* vendor drawer (fichas desplegables) → real liquid glass: it floats over the
   page, so the backdrop blur refracts the actual dashboard behind it. */
.drawer{
  background:var(--glass-panel);
  -webkit-backdrop-filter:blur(40px) saturate(190%);
  backdrop-filter:blur(40px) saturate(190%);
  border-left:1px solid var(--glass-brd);
  box-shadow:var(--glass-hi),-18px 0 50px rgba(10,20,24,.30);
  isolation:isolate;
}
/* specular sheen so the panel reads as glass (especially in dark mode) */
.drawer::before{
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 14%),
    radial-gradient(58% 26% at 88% -2%, rgba(120,225,220,.16), transparent 60%);
  mix-blend-mode:screen;
}
.drawer-head,.drawer-body{position:relative;z-index:1}
/* dark mode: more translucent + luminous edges so it really reads as glass */
html[data-theme="dark"] .drawer{
  background:
    radial-gradient(86% 28% at 88% 0%, rgba(22,200,191,.15), transparent 55%),
    radial-gradient(72% 26% at 8% 100%, rgba(46,86,176,.15), transparent 55%),
    linear-gradient(158deg, rgba(34,47,62,.46), rgba(13,19,27,.40));
  border-left:1px solid rgba(255,255,255,.16);
  box-shadow:
    inset 1px 0 0 rgba(255,255,255,.15),
    inset 0 1px 0 rgba(255,255,255,.10),
    -22px 0 64px rgba(0,0,0,.55);
}
html[data-theme="dark"] .drawer-head{
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.015));
}
.drawer-head{
  background:var(--glass-soft);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  backdrop-filter:blur(16px) saturate(160%);
  border-bottom:1px solid var(--glass-brd);
}
.drawer-close{background:var(--glass-soft);border:1px solid var(--glass-brd)}
.dr-k,.dr-mom{background:var(--glass);border-color:var(--glass-brd)}
/* history dropdown + segmented control, for consistency */
.hist-menu{
